<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCT WA Campsite Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Source+Code+Pro:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg:#f4f6fa; --bg2:#ffffff; --bg3:#eaecf4;
      --border:#cdd4e0; --text:#1a2235; --text2:#4a5a78; --text3:#6878a0;
      --green:#2a7d4f; --green-bg:#e6f4ed; --green-dim:#1a5c38;
      --blue:#2058a8; --blue-bg:#e6eef8;
      --red:#b82020; --red-bg:#fce8e8;
      --amber:#9a6400; --amber-bg:#fef3dc;
      --r:6px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);}
    #app{display:grid;grid-template-columns:380px 1fr;height:100vh;}

    /* ── SIDEBAR ── */
    #sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    header{background:linear-gradient(90deg,#0d1a30,#162540);padding:12px 16px;flex-shrink:0;}
    header h1{font-family:'Bitter',serif;font-size:15px;color:#fff;font-weight:700;}
    header p{font-size:11px;color:#8fa3bf;margin-top:3px;}

    .toolbar{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap;}
    .btn{padding:6px 10px;border-radius:4px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
    .btn-g{background:var(--green-bg);color:var(--green);border-color:var(--green);}
    .btn-g:hover{background:var(--green);color:#fff;}
    .btn-b{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
    .btn-b:hover{background:var(--blue);color:#fff;}
    .btn-r{background:var(--red-bg);color:var(--red);border-color:var(--red);}
    .btn-r:hover{background:var(--red);color:#fff;}
    .btn-a{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
    .btn-a:hover{background:var(--amber);color:#fff;}

    #search-wrap{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
    #search{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;
      font-size:12px;font-family:inherit;background:var(--bg3);color:var(--text);}
    #search:focus{outline:none;border-color:var(--blue);}
    #count{font-size:10px;color:var(--text3);margin-top:4px;}

    #camp-list{flex:1;overflow-y:auto;}
    #camp-list::-webkit-scrollbar{width:4px;}
    #camp-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    .camp-row{padding:7px 10px;border-bottom:1px solid var(--border);cursor:pointer;
      display:flex;align-items:center;gap:8px;transition:background .1s;}
    .camp-row:hover{background:var(--bg3);}
    .camp-row.selected{background:var(--blue-bg);border-left:3px solid var(--blue);}
    .camp-row.new-camp{border-left:3px solid var(--green);}
    .crow-mile{font-family:'Source Code Pro',monospace;font-size:10px;color:var(--text3);width:48px;flex-shrink:0;}
    .crow-name{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .crow-type{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0;}
    .type-halfmile{background:#eaecf4;color:#4a5a78;}
    .type-resupply{background:var(--blue-bg);color:var(--blue);}
    .type-custom{background:var(--green-bg);color:var(--green);}

    /* ── FORM PANEL ── */
    #form-panel{background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;max-height:55vh;overflow-y:auto;}
    #form-panel::-webkit-scrollbar{width:4px;}
    #form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .form-header{padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);
      font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;
      display:flex;justify-content:space-between;align-items:center;}
    .form-body{padding:12px;}
    .frow{display:grid;grid-template-columns:110px 1fr;align-items:center;gap:6px;margin-bottom:8px;}
    .flbl{font-size:11px;color:var(--text3);}
    .finp{padding:5px 7px;border:1px solid var(--border);border-radius:4px;
      font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);width:100%;}
    .finp:focus{outline:none;border-color:var(--blue);}
    .finp:read-only{background:var(--bg3);color:var(--text3);}
    .fcheck{display:flex;align-items:center;gap:6px;font-size:12px;}
    .form-actions{display:flex;gap:6px;padding:0 12px 12px;flex-wrap:wrap;}
    .source-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;}

    /* ── MAP ── */
    #map-wrap{position:relative;}
    #map{height:100%;}
    #map-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:800;
      background:rgba(20,40,90,.88);border:1px solid #3a4a60;border-radius:5px;
      font-size:11px;color:#ddeeff;padding:5px 12px;pointer-events:none;white-space:nowrap;}

    /* ── STATUS BAR ── */
    #statusbar{position:absolute;bottom:0;left:0;right:0;z-index:800;
      padding:5px 14px;font-size:11px;color:#fff;display:none;}
    #statusbar.ok{background:#2a7d4f;}
    #statusbar.err{background:#b82020;}
    #statusbar.info{background:#2058a8;}

    /* ── LOADING ── */
    #loading{position:fixed;inset:0;background:#f4f6fa;display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:9999;}
    #loading h2{font-family:'Bitter',serif;color:#1a2235;margin-bottom:8px;}
    #loading p{color:#6878a0;font-size:13px;}
    .spin{width:36px;height:36px;border:3px solid #cdd4e0;border-top-color:#2a7d4f;
      border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .tip-tooltip{background:#fff!important;border:1px solid var(--green)!important;
      color:var(--green)!important;font-family:'Source Code Pro',monospace!important;font-size:11px!important;}
  </style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <h2>PCT Campsite Editor</h2>
  <p>Loading campsite data…</p>
</div>

<div id="app">
  <div id="sidebar">
    <header>
      <h1>PCT Washington · Campsite Editor</h1>
      <p>Add, edit, and export campsite data</p>
    </header>

    <div class="toolbar">
      <button class="btn btn-g" onclick="newCamp()">＋ New Campsite</button>
      <button class="btn btn-b" onclick="loadFile()">📂 Load JSON</button>
      <button class="btn btn-a" onclick="exportJSON()">⬇ Save JSON</button>
      <input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileLoad(event)">
    </div>

    <div id="search-wrap">
      <input id="search" placeholder="Search by name or mile…" oninput="filterList()">
      <div id="count"></div>
    </div>

    <div id="camp-list"></div>

    <div id="form-panel" style="display:none">
      <div class="form-header">
        <span id="form-title">Edit Campsite</span>
        <span id="form-source-badge" class="source-badge"></span>
      </div>
      <div class="form-body">
        <div class="frow">
          <label class="flbl">Name</label>
          <input class="finp" id="f-name" placeholder="CampsiteName">
        </div>
        <div class="frow">
          <label class="flbl">Mile (NOBO)</label>
          <input class="finp" id="f-mile" type="number" step="0.01" placeholder="2200.00">
        </div>
        <div class="frow">
          <label class="flbl">Latitude</label>
          <input class="finp" id="f-lat" type="number" step="0.000001" placeholder="47.0000">
        </div>
        <div class="frow">
          <label class="flbl">Longitude</label>
          <input class="finp" id="f-lon" type="number" step="0.000001" placeholder="-121.0000">
        </div>
        <div class="frow">
          <label class="flbl">Elevation (ft)</label>
          <input class="finp" id="f-elev" type="number" step="1" placeholder="4500">
        </div>
        <div class="frow">
          <label class="flbl">Type</label>
          <select class="finp" id="f-type">
            <option value="Undeveloped">Undeveloped</option>
            <option value="Established">Established</option>
            <option value="Resupply">Resupply</option>
          </select>
        </div>
        <div class="frow">
          <label class="flbl">Notes / Desc</label>
          <textarea class="finp" id="f-desc" rows="3" style="resize:vertical;line-height:1.4"></textarea>
        </div>
        <div class="frow">
          <label class="flbl">Amenities</label>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label class="fcheck"><input type="checkbox" id="f-water"> 💧 Water</label>
            <label class="fcheck"><input type="checkbox" id="f-outhouse"> 🚽 Outhouse</label>
          </div>
        </div>
        <div class="frow">
          <label class="flbl">Source</label>
          <input class="finp" id="f-source" readonly>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-g" onclick="saveCamp()">💾 Save</button>
        <button class="btn btn-b" onclick="pickOnMap()">📍 Pick on Map</button>
        <button class="btn btn-r" onclick="deleteCamp()">🗑 Delete</button>
        <button class="btn" style="background:var(--bg3);color:var(--text3);border-color:var(--border)" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-hint">Click map to set lat/lon when picking location</div>
    <div id="statusbar"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let campsites = [];        // full array (loaded from JSON)
let filtered  = [];        // current search results
let selectedIdx = null;    // index into campsites[]
let pickingMode = false;   // waiting for map click
let editMarker  = null;    // temporary marker while editing
let isDirty     = false;   // unsaved changes flag

// ════════════════════════════════════════════════════
// MAP
// ════════════════════════════════════════════════════
const map = L.map('map', {zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenTopoMap (CC-BY-SA)',maxZoom:17
}).addTo(map);

map.setView([47.2, -121.5], 8);

// Camp dot layer
const dotLayer = L.layerGroup().addTo(map);
// Trail line placeholder
const trailLayer = L.layerGroup().addTo(map);

// Map click for location picking
map.on('click', e => {
  if(!pickingMode) return;
  document.getElementById('f-lat').value = e.latlng.lat.toFixed(6);
  document.getElementById('f-lon').value = e.latlng.lng.toFixed(6);
  if(editMarker) map.removeLayer(editMarker);
  editMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
  setPickMode(false);
  showStatus('Location set — click Save to confirm', 'info');
});

// ════════════════════════════════════════════════════
// LOAD DATA
// ════════════════════════════════════════════════════
async function loadData() {
  const [campsResp, trailResp] = await Promise.all([
    fetch('data/campsites.json'),
    fetch('data/trail.geojson')
  ]);
  if(!campsResp.ok) throw new Error('Cannot load data/campsites.json');

  campsites = await campsResp.json();

  // Draw trail if available
  if(trailResp.ok) {
    const geo = await trailResp.json();
    const coords = geo.features[0].geometry.coordinates.map(([lon,lat]) => [lat,lon]);
    L.polyline(coords, {color:'#e07020', weight:2, opacity:0.6}).addTo(trailLayer);
  }

  renderDots();
  filterList();
  map.fitBounds(L.latLngBounds(
    campsites.filter(c=>c.lat).map(c=>[c.lat,c.lon])
  ), {padding:[20,20]});
}

// ════════════════════════════════════════════════════
// DOT RENDERING
// ════════════════════════════════════════════════════
function renderDots() {
  dotLayer.clearLayers();
  campsites.forEach((c, i) => {
    if(!c.lat || !c.lon) return;
    const isNew = c.source === 'custom';
    const isRS  = c.source === 'resupply';
    const color = isRS ? '#1d4ed8' : isNew ? '#2a7d4f' : '#e07020';
    const r     = isRS ? 5 : isNew ? 5 : 3;
    L.circleMarker([c.lat, c.lon], {
      radius:r, color, weight:isNew||isRS?2:1.5,
      fillColor: isRS ? '#93c5fd' : isNew ? '#86efac' : '#ffffff',
      fillOpacity:0.9, opacity:0.85
    })
    .bindTooltip(`${c.name} (Mi ${c.mile.toFixed(1)})`,
      {className:'tip-tooltip', direction:'top', offset:[0,-4]})
    .on('click', () => selectByIndex(i))
    .addTo(dotLayer);
  });
}

// ════════════════════════════════════════════════════
// LIST RENDERING
// ════════════════════════════════════════════════════
function filterList() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = campsites.filter(c =>
    !q ||
    c.name.toLowerCase().includes(q) ||
    String(c.mile).includes(q)
  );
  renderList();
}

function renderList() {
  const list = document.getElementById('camp-list');
  list.innerHTML = '';
  document.getElementById('count').textContent =
    `${filtered.length} of ${campsites.length} campsites`;

  filtered.forEach(c => {
    const realIdx = campsites.indexOf(c);
    const row = document.createElement('div');
    row.className = 'camp-row' +
      (realIdx === selectedIdx ? ' selected' : '') +
      (c.source === 'custom' ? ' new-camp' : '');

    const typeLabel = c.source === 'resupply' ? 'resupply'
                    : c.source === 'custom'   ? 'custom'
                    : 'halfmile';
    row.innerHTML = `
      <div class="crow-mile">${c.mile.toFixed(1)}</div>
      <div class="crow-name">${c.name}</div>
      <div class="crow-type type-${typeLabel}">${typeLabel}</div>`;
    row.onclick = () => selectByIndex(realIdx);
    list.appendChild(row);
  });
}

// ════════════════════════════════════════════════════
// SELECTION & FORM
// ════════════════════════════════════════════════════
function selectByIndex(i) {
  selectedIdx = i;
  const c = campsites[i];
  populateForm(c);
  filterList();     // re-render to show selection highlight

  // Fly map to camp
  if(c.lat && c.lon) {
    map.setView([c.lat, c.lon], Math.max(map.getZoom(), 12));
    if(editMarker) map.removeLayer(editMarker);
    editMarker = L.marker([c.lat, c.lon]).addTo(map);
  }
}

function populateForm(c) {
  document.getElementById('form-panel').style.display = '';
  document.getElementById('form-title').textContent =
    c._new ? 'New Campsite' : `Edit: ${c.name}`;

  const badge = document.getElementById('form-source-badge');
  const src = c.source || 'halfmile';
  badge.textContent = src;
  badge.style.background = src==='resupply'?'#deeaf8':src==='custom'?'#d8f0e4':'#eaecf4';
  badge.style.color = src==='resupply'?'#1a5090':src==='custom'?'#1a6038':'#4a5a78';

  document.getElementById('f-name').value    = c.name    || '';
  document.getElementById('f-mile').value    = c.mile    || '';
  document.getElementById('f-lat').value     = c.lat     || '';
  document.getElementById('f-lon').value     = c.lon     || '';
  document.getElementById('f-elev').value    = c.elev    || '';
  document.getElementById('f-type').value    = c.type    || 'Undeveloped';
  document.getElementById('f-desc').value    = c.desc    || '';
  document.getElementById('f-water').checked    = !!c.water;
  document.getElementById('f-outhouse').checked = !!c.outhouse;
  document.getElementById('f-source').value  = src;
}

function formToObject() {
  const lat  = parseFloat(document.getElementById('f-lat').value);
  const lon  = parseFloat(document.getElementById('f-lon').value);
  const mile = parseFloat(document.getElementById('f-mile').value);
  const elev = parseInt(document.getElementById('f-elev').value) || null;
  const name = document.getElementById('f-name').value.trim();
  if(!name)        { showStatus('Name is required', 'err'); return null; }
  if(isNaN(mile))  { showStatus('Mile is required', 'err'); return null; }
  if(isNaN(lat) || isNaN(lon)) { showStatus('Lat/lon required — use Pick on Map or enter manually', 'err'); return null; }
  return {
    mile, name, lat, lon, elev,
    type:     document.getElementById('f-type').value,
    desc:     document.getElementById('f-desc').value.trim() || undefined,
    water:    document.getElementById('f-water').checked,
    outhouse: document.getElementById('f-outhouse').checked,
    source:   document.getElementById('f-source').value || 'custom',
  };
}

// ════════════════════════════════════════════════════
// CRUD OPERATIONS
// ════════════════════════════════════════════════════
function newCamp() {
  const c = {
    name:'', mile:'', lat:null, lon:null, elev:null,
    type:'Undeveloped', water:false, outhouse:false,
    source:'custom', _new:true
  };
  campsites.push(c);
  selectedIdx = campsites.length - 1;
  populateForm(c);
  filterList();
  showStatus('Fill in the form and click Save, or use Pick on Map', 'info');
}

function saveCamp() {
  const obj = formToObject();
  if(!obj) return;

  // Remove internal _new flag
  delete obj._new;

  campsites[selectedIdx] = obj;
  campsites.sort((a,b) => a.mile - b.mile);
  // Re-find selected index after sort
  selectedIdx = campsites.findIndex(c => c.name === obj.name && Math.abs(c.mile - obj.mile) < 0.001);

  if(editMarker) { map.removeLayer(editMarker); editMarker = null; }
  isDirty = true;
  renderDots();
  filterList();
  showStatus(`✓ Saved "${obj.name}" — download JSON to make it permanent`, 'ok');
}

function deleteCamp() {
  if(selectedIdx === null) return;
  const c = campsites[selectedIdx];
  if(!confirm(`Delete "${c.name}"? This cannot be undone.`)) return;
  campsites.splice(selectedIdx, 1);
  selectedIdx = null;
  document.getElementById('form-panel').style.display = 'none';
  if(editMarker) { map.removeLayer(editMarker); editMarker = null; }
  isDirty = true;
  renderDots();
  filterList();
  showStatus('Campsite deleted — download JSON to make permanent', 'ok');
}

function cancelEdit() {
  // If the selected camp is still _new (never saved), remove it
  if(selectedIdx !== null && campsites[selectedIdx]._new) {
    campsites.splice(selectedIdx, 1);
    renderDots();
  }
  selectedIdx = null;
  document.getElementById('form-panel').style.display = 'none';
  if(editMarker) { map.removeLayer(editMarker); editMarker = null; }
  setPickMode(false);
  filterList();
}

// ════════════════════════════════════════════════════
// MAP PICKING
// ════════════════════════════════════════════════════
function pickOnMap() {
  setPickMode(true);
}

function setPickMode(on) {
  pickingMode = on;
  document.getElementById('map-hint').style.display = on ? 'block' : 'none';
  map.getContainer().style.cursor = on ? 'crosshair' : '';
}

// ════════════════════════════════════════════════════
// FILE I/O
// ════════════════════════════════════════════════════
function loadFile() {
  document.getElementById('file-input').click();
}

function onFileLoad(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('Expected a JSON array');
      campsites = data;
      selectedIdx = null;
      document.getElementById('form-panel').style.display = 'none';
      renderDots();
      filterList();
      showStatus(`✓ Loaded ${data.length} campsites from ${file.name}`, 'ok');
    } catch(err) {
      showStatus(`Error reading file: ${err.message}`, 'err');
    }
  };
  reader.readAsText(file);
  event.target.value = '';  // reset so same file can be loaded again
}

function exportJSON() {
  // Clean up: remove any unsaved _new entries
  const clean = campsites
    .filter(c => !c._new)
    .map(c => {
      const out = {...c};
      if(!out.desc) delete out.desc;
      return out;
    });

  const blob = new Blob([JSON.stringify(clean, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'campsites.json';
  a.click();
  URL.revokeObjectURL(a.href);
  isDirty = false;
  showStatus(`✓ Downloaded campsites.json (${clean.length} entries) — place in data/ folder`, 'ok');
}

// ════════════════════════════════════════════════════
// STATUS BAR
// ════════════════════════════════════════════════════
let statusTimer = null;
function showStatus(msg, type='info') {
  const bar = document.getElementById('statusbar');
  bar.textContent = msg;
  bar.className = type;
  bar.style.display = 'block';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => bar.style.display='none', 4000);
}

// Warn on navigation with unsaved changes
window.addEventListener('beforeunload', e => {
  if(isDirty) { e.preventDefault(); e.returnValue=''; }
});

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
async function init() {
  try {
    await loadData();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('map-hint').style.display = 'none';
  } catch(err) {
    document.getElementById('loading').innerHTML = `
      <h2 style="color:#b82020">Failed to load data</h2>
      <p>${err.message}</p>
      <p style="margin-top:8px;font-size:12px;color:#6878a0">
        Run: <code style="background:#eaecf4;padding:2px 6px;border-radius:3px">python3 -m http.server 8000</code>
        then open <a href="http://localhost:8000/editor.html">localhost:8000/editor.html</a>
      </p>`;
  }
}

init();
</script>
</body>
</html>
